after-startup-command = [
	'exec-and-forget /opt/homebrew/opt/sketchybar/bin/sketchybar']

start-at-login = false

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

default-root-container-layout = 'tiles'

default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = true

# Notify Sketchybar about workspace change
exec-on-workspace-change = [
	'/bin/bash',
	'-c',
	'/opt/homebrew/opt/sketchybar/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]


[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 10
    inner.vertical =   10
    outer.left =       12
    outer.bottom =     10
    outer.top =        2
    outer.right =      12

[mode.main.binding]

    # (like in i3)
    alt-enter = "exec-and-forget open -na 'Ghostty'"



    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-c = 'workspace code'
    alt-m = 'workspace media'
    alt-p = 'workspace privt'
    alt-s = 'workspace social'
    alt-t = 'workspace todo'
    alt-w = 'workspace web'

    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-c = 'move-node-to-workspace code'
    alt-shift-m = 'move-node-to-workspace media'
    alt-shift-p = 'move-node-to-workspace privt'
    alt-shift-s = 'move-node-to-workspace social'
    alt-shift-t = 'move-node-to-workspace todo'
    alt-shift-w = 'move-node-to-workspace web'

    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    alt-shift-backspace = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']
    alt-f = 'fullscreen'
    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

    down = 'volume down'
    up = 'volume up'
    shift-down = ['volume set 0', 'mode main']

# Windows that should float
    [[on-window-detected]]
    if.app-id = 'com.apple.systempreferences'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'ch.protonvpn.mac'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'com.colliderli.iina'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'imagetasks.Pixea'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'net.freemacsoft.AppCleaner'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'com.daisydiskapp.DaisyDiskStandAlone'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'org.freedownloadmanager.fdm6'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'com.apple.AppStore'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'com.apple.passwords'
    run = 'layout floating'


    ## move to 4_social workspace
    [[on-window-detected]]
    if.app-id = 'com.apple.MobileSMS'
    run = ['move-node-to-workspace social']
    [[on-window-detected]]
    if.app-id = 'com.apple.mail'
    run = ['move-node-to-workspace social']

    ## move to multi5_media workspace
    [[on-window-detected]]
    if.app-id = 'com.spotify.client'
    run = ['move-node-to-workspace media']
    [[on-window-detected]]
    if.app-id = 'com.apple.QuickTimePlayerX'
    run = ['move-node-to-workspace media']
    [[on-window-detected]]
    if.app-id = 'com.colliderli.iina'
    run = ['move-node-to-workspace media']
    [[on-window-detected]]
    if.app-id = 'imagetasks.Pixea'
    run = ['move-node-to-workspace media']

    ##move to 1_code workspace
    [[on-window-detected]]
    if.app-id = 'dev.zed.Zed'
    run = ['move-node-to-workspace code']

    ##move to space 3_todo
    [[on-window-detected]]
    if.app-id = 'com.apple.iCal'
    run = ['move-node-to-workspace todo']
    [[on-window-detected]]
    if.app-id = 'com.culturedcode.ThingsMac'
    run = ['move-node-to-workspace todo']


    [[on-window-detected]]
    if.app-id = 'com.apple.systempreferences'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'ch.protonvpn.mac'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'com.colliderli.iina'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'imagetasks.Pixea'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'net.freemacsoft.AppCleaner'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'com.daisydiskapp.DaisyDiskStandAlone'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'org.freedownloadmanager.fdm6'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'com.apple.AppStore'
    run = 'layout floating'
    [[on-window-detected]]
    if.app-id = 'com.apple.passwords'
    run = 'layout floating'

    [[on-window-detected]]
    if.app-id="com.mitchellh.ghostty"
    run= [
      "layout tiling",
    ]
